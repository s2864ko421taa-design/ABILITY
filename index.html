<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CORE 48診断</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>CORE 48診断</h1>
      <p class="lead">
        直感で A / B を選べ。<br>
        思考じゃなく、お前を動かす“核”を暴く診断だ。
      </p>
      <div class="hero-meta">
        <span>48 Questions</span>
        <span>4 Axes</span>
        <span>Auto Scroll</span>
      </div>
    </header>

    <main>
      <form id="quizForm"></form>

      <section id="result" class="result hidden">
        <h2>診断結果</h2>
        <div id="typeBox" class="type-box">----</div>
        <p id="summary" class="summary"></p>

        <div class="score-grid">
          <div class="score-card">
            <h3>Core Drive</h3>
            <p id="scoreC"></p>
          </div>
          <div class="score-card">
            <h3>Outlook</h3>
            <p id="scoreO"></p>
          </div>
          <div class="score-card">
            <h3>Response</h3>
            <p id="scoreR"></p>
          </div>
          <div class="score-card">
            <h3>Edge</h3>
            <p id="scoreE"></p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="bottom-bar">
    <div class="progress-wrap">
      <div class="progress-text" id="progressText">0 / 48 answered</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="button-wrap">
      <button type="button" class="btn ghost" onclick="resetQuiz()">リセット</button>
      <button type="button" class="btn primary" onclick="calculateResult()">結果を見る</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
