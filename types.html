<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャラ説明欄</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="box">
    <h1>キャラ説明欄</h1>
    <p>対人メンタルタイプの一覧ページです。</p>

    <div class="type-card">
      <h2>SRFDN｜観察共鳴型</h2>
      <p>慎重に人を見ながらも、相手の空気や感情にかなり敏感で、深く共鳴しやすいタイプ。</p>
    </div>

    <div class="type-card">
      <h2>GRLCN｜陽キャ参謀型</h2>
      <p>自然な社交性と流れを作る力を持ちつつ、深い関係も築ける万能型。</p>
    </div>

    <div class="type-card">
      <h2>SMLCB｜仮面の管理者型</h2>
      <p>その場に最適な自分を保ちながら、冷静に全体を整えるタイプ。</p>
    </div>

    <div class="type-card">
      <h2>GMFCB｜平和維持型</h2>
      <p>空気を壊さず、人と自然に関わりながら、自分の境界線も守れる安定型。</p>
    </div>

    <a href="index.html">
      <button>診断ページに戻る</button>
    </a>
  </div>
</body>
</html>
